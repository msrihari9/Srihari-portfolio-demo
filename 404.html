<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Srihari M</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .not-found {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .not-found .code {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 800;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .not-found p { color: var(--color-text-muted); max-width: 420px; margin: 8px 0 28px; }
  </style>
</head>
<body>
  <div class="not-found">
    <span class="code">404</span>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or may have moved. Let's get you back on track.</p>
    <a href="index.html" class="btn btn-primary" style="color:#fff;">← Back to Home</a>
  </div>
</body>
</html>
